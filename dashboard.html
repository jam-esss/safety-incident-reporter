<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tab Title -->
    <title>
        Dashboard | Logo Ipsum
    </title>
    <!-- Tab Favicon -->
    <link rel="icon" href="images/logos/logoipsum-icon.png">
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Include Stylesheet -->
    <link rel="stylesheet" href="stylesheets/stylesheet.css">
</head>

<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-md bg-colour-3 fixed-top">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            <img src="/images/logos/logoipsum-long.png" alt="Logo Ipsum">
        </a>

        <button class="navbar-toggler p-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
                aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="offcanvas offcanvas-end bg-colour-3" tabindex="-1" id="offcanvasNavbar"
             aria-labelledby="offcanvasNavbarLabel">

            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="offcanvasNavbarLabel">
                    <img src="/images/logos/logoipsum-icon.png" alt="Logo Ipsum">
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
            </div>

            <div class="offcanvas-body align-content-center">
                <ul class="navbar-nav justify-content-end text-center flex-grow-1 pe-3">

                    <li class="nav-item p-3">
                        <a class="nav-link fs-5" aria-current="page" href="/">
                            <i class="bi bi-house"></i>
                            Home
                        </a>
                    </li>

                    <li class="nav-item p-3">
                        <a class="nav-link fs-5 active" href="/dashboard.html">
                            <i class="bi bi-speedometer2"></i>
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item p-3">
                        <a class="nav-link fs-5" href="/contact.html">
                            <i class="bi bi-chat-dots"></i>
                            Contact
                        </a>
                    </li>

                </ul>
            </div>
        </div>
    </div>
</nav>
<!-- Dashboard Tiles -->
<section class="d-flex justify-content-center align-items-center">

    <div class="row d-flex justify-content-center align-items-center m-1">

        <div class="col-4 col-md-3 g-0 p-1">
            <a href="/" class="tile btn-logo-ipsum">
                <i class="bi bi-house-door-fill"></i>
                <span>
                    Home
                </span>
            </a>
        </div>

        <div class="col-4 col-md-3 g-0 p-1">
            <a class="tile bg-colour-4">
                <i class="bi bi-person-circle"></i>
                <span>
                    Profile
                </span>
            </a>
        </div>

        <div class="col-4 col-md-3 g-0 p-1">
            <a class="tile bg-colour-4">
                <i class="bi bi-bell-fill"></i>
                <span>
                    Notifications
                </span>
            </a>
        </div>

        <div class="col-4 col-md-3 g-0 p-1">
            <a class="tile bg-colour-4">
                <i class="bi bi-gear-fill"></i>
                <span>
                    Settings
                </span>
            </a>
        </div>

        <div class="col-8 col-md-6 g-0 p-1">
            <a href="/reports/form.html" class="tile-wide btn-logo-ipsum">
                <i class="bi bi-flag-fill"></i>
                <span>
                    Report Incident
                </span>
            </a>
        </div>

        <div class="col-8 col-md-6 g-0 p-1">
            <a class="tile-wide bg-colour-4">
                <i class="bi bi-card-checklist"></i>
                <span>
                    Reported Incidents
                </span>
            </a>
        </div>

        <div class="col-4 col-md-3 g-0 p-1">
            <a class="tile bg-colour-4">
                <i class="bi bi-archive-fill"></i>
                <span>
                    Files
                </span>
            </a>
        </div>

        <div class="col-4 col-md-3 g-0 p-1">
            <a class="tile bg-colour-4">
                <i class="bi bi-tools"></i>
                <span>
                    Equipment
                </span>
            </a>
        </div>

    </div>
</section>


<!-- Include Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

<!-- Include main.js -->
<script src="/scripts/main.js"></script>
</body>
</html>
