            <div class="offcanvas-body align-content-center">

<!-- Landing Section -->
<section class="bg-image-1 d-flex justify-content-center align-items-center">
    <div class="container d-flex justify-content-center align-items-center glass py-3" style="max-width: 800px; min-height: 400px;" id="Card">
        <div class="row">
            <div class="col-md-6 d-flex justify-content-center align-items-center my-3">
                <svg viewBox="0 0 40 40" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="max-width: 200px; max-height: 200px; color: var(--colour-1);">
                    <path d="M20 0C25.3043 4.00466e-07 30.3919 2.10669 34.1426 5.85742C34.8157 6.53058 35.4354 7.24719 36 8H20C16.8174 8 13.7651 9.26421 11.5146 11.5146C9.26421 13.7651 8 16.8174 8 20H20L36.9102 9.31934C38.1656 11.3074 39.0611 13.5027 39.5547 15.8027L32 20H40L39.9941 20.4971C39.8669 25.6213 37.776 30.5092 34.1426 34.1426C30.3919 37.8933 25.3043 40 20 40C14.6957 40 9.60815 37.8933 5.85742 34.1426C5.18426 33.4694 4.56459 32.7528 4 32H20C23.1826 32 26.2349 30.7358 28.4854 28.4854C30.5952 26.3755 31.8383 23.5608 31.9854 20.5947L32 20H20L3.08984 30.6787C1.83452 28.6906 0.941002 26.4951 0.447266 24.1953L8 20H0C8.00931e-07 14.6957 2.1067 9.60815 5.85742 5.85742C9.60815 2.1067 14.6957 -5.79361e-10 20 0Z"></path>
                </svg>
            </div>
            <div class="col-md-6 d-flex justify-content-center align-items-center text-white my-3">
                <h1 class="fs-3">
                    The quickest, simplest and most efficient way to report incidents.
                    <br>
                    Logo Ipsum:
                    <br>
                    Helping you keep your people safe, one report at a time.
                </h1>
            </div>
        </div>
    </div>
</section>

<script>
    /* CARD PARALLAX */
    const card = document.querySelector("#Card");
    document.addEventListener("mousemove", (e) => {

        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;

        const rotateY = (x - 0.5) * 15;
        const rotateX = (0.5 - y) * 15;

        card.style.transform =
            `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
</script>

<!-- Include Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
