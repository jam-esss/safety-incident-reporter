<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tab Title -->
    <title>
        Incident Reporter | Logo Ipsum
    </title>
    <!-- Tab Favicon -->
    <link rel="icon" href="/images/logos/logoipsum-icon.png">
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Include Stylesheet -->
    <link rel="stylesheet" href="/stylesheets/stylesheet.css">
</head>

<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-md bg-colour-3 fixed-top">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            <img src="/images/logos/logoipsum-long.png" alt="Logo Ipsum">
        </a>

        <button class="navbar-toggler p-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
                aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="offcanvas offcanvas-end bg-colour-3" tabindex="-1" id="offcanvasNavbar"
             aria-labelledby="offcanvasNavbarLabel">

            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="offcanvasNavbarLabel">
                    <img src="/images/logos/logoipsum-icon.png" alt="Logo Ipsum">
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
            </div>

            <div class="offcanvas-body align-content-center">
                <ul class="navbar-nav justify-content-end text-center flex-grow-1 pe-3">

                    <li class="nav-item p-3">
                        <a class="nav-link fs-5" aria-current="page" href="/">
                            <i class="bi bi-house"></i>
                            Home
                        </a>
                    </li>

                    <li class="nav-item p-3">
                        <a class="nav-link fs-5" href="/dashboard.html">
                            <i class="bi bi-speedometer2"></i>
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item p-3">
                        <a class="nav-link fs-5" href="/contact.html">
                            <i class="bi bi-chat-dots"></i>
                            Contact
                        </a>
                    </li>

                </ul>
            </div>
        </div>
    </div>
</nav>

<!-- Form -->
<section class="d-flex justify-content-center align-items-center">
    <div class="container d-flex flex-column justify-content-center align-items-center glass py-3"
         style="max-width:800px; min-height: 250px">
        <form class="row g-3 needs-validation w-100" id="contactForm" novalidate>

            <h1>
                Report an Incident
            </h1>

            <h2>
                Your Information
            </h2>

            <div class="col-md-4">
                <label for="userFullName" class="form-label">
                    Full Name
                </label>
                <input type="text" class="form-control" id="userFullname" minlength="5" required>
                <div class="invalid-feedback">
                    Invalid Input.
                </div>
            </div>

            <div class="col-md-4">
                <label for="userEmployeeNumber" class="form-label">
                    Employee Number
                </label>
                <input type="text" class="form-control" id="userEmployeeNumber" minlength="5" required>
                <div class="invalid-feedback">
                    Invalid Input.
                </div>
            </div>

            <div class="col-md-4">
                <label for="userJobRole" class="form-label">
                    Job Role
                </label>
                <select class="form-select" id="userJobRole" required>
                    <option selected disabled value="">
                        Choose...
                    </option>
                    <option>
                        Labourer
                    </option>
                    <option>
                        Carpenter
                    </option>
                    <option>
                        Electrician
                    </option>
                    <option>
                        Plumber
                    </option>
                    <option>
                        Other
                    </option>
                </select>
            </div>

            <h2>
                Their Information
            </h2>

            <div class="col-md-4">
                <label for="victimFullName" class="form-label">
                    Full Name
                </label>
                <input type="text" class="form-control" id="victimFullName" minlength="5" required>
                <div class="invalid-feedback">
                    Invalid Input.
                </div>
            </div>

            <div class="col-md-4">
                <label for="victimEmployeeNumber" class="form-label">
                    Employee Number
                </label>
                <input type="text" class="form-control" id="victimEmployeeNumber" minlength="5" required>
                <div class="invalid-feedback">
                    Invalid Input.
                </div>
            </div>

            <div class="col-md-4">
                <label for="victimJobRole" class="form-label">
                    Job Role
                </label>
                <select class="form-select" id="victimJobRole" required>
                    <option selected disabled value="">
                        Choose...
                    </option>
                    <option>
                        Labourer
                    </option>
                    <option>
                        Carpenter
                    </option>
                    <option>
                        Electrician
                    </option>
                    <option>
                        Plumber
                    </option>
                    <option>
                        Other
                    </option>
                </select>
            </div>

            <h2>
                Further Information
            </h2>

            <div class="col-md-4">
                <label for="siteName" class="form-label">
                    Site
                </label>
                <input type="text" class="form-control" id="siteName" minlength="5" required>
                <div class="invalid-feedback">
                    Invalid Input.
                </div>
            </div>

            <div class="col-md-4">
                <label for="time" class="form-label">
                    Time
                </label>
                <input type="time" class="form-control" id="time" required>
                <div class="invalid-feedback">
                    Invalid Input.
                </div>
            </div>

            <div class="col-md-4">
                <label for="date" class="form-label">
                    Date
                </label>
                <input type="date" class="form-control" id="date" required>
                <div class="invalid-feedback">
                    Invalid Input.
                </div>
            </div>

            <h3>
                Severity
            </h3>

            <div class="col-4">
                <label for="severityLow" class="form-label">
                    Low
                </label>
                <input name="severity" type="radio" class="form-check-input" id="severityLow" required>
            </div>

            <div class="col-4">
                <label for="severityMedium">
                    Medium
                </label>
                <input name="severity" type="radio" class="form-check-input" id="severityMedium">
            </div>

            <div class="col-4">
                <label for="severityHigh">
                    High
                </label>
                <input name="severity" type="radio" class="form-check-input" id="severityHigh">
            </div>

            <div class="col-md-12">
                <label for="description" class="form-label">
                    Description
                </label>
                <textarea class="form-control" id="description" minlength="50" maxlength="3000" rows="3" required></textarea>
            </div>

            <div class="col-12">
                <button class="btn btn-logo-ipsum" type="submit">
                    Submit
                </button>
            </div>
        </form>

        <div id="successMessage" style="display: none">
            <div class="d-flex flex-column justify-content-center align-items-center">
                <h2 class="my-3">
                    Downloading your report now...
                </h2>
                <img class="my-3" src="/images/logos/logoipsum-long.png" alt="Logo Ipsum">
                <a class="btn btn-logo-ipsum" href="/dashboard.html">
                    Return To Dashboard
                </a>
            </div>
        </div>

    </div>
</section>
</body>
<script src="/scripts/main.js" type="module"></script>
